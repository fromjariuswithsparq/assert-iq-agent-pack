# goreleaser config for qi-signal-aggregator
# Run locally: cd mcp/qi-signal-aggregator && goreleaser release --clean
# In CI: triggered by `git tag v* && git push --tags` via .github/workflows/release.yml
version: 2

project_name: qi-signal-aggregator

before:
  hooks:
    - go mod tidy

builds:
  - id: qi-signal-aggregator
    main: ./cmd/qi-signal-aggregator
    binary: qi-signal-aggregator
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.ShortCommit}}
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      # Windows arm64 is not in v0.1 release matrix — skip.
      - goos: windows
        goarch: arm64

archives:
  - id: default
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    formats: ["tar.gz"]
    format_overrides:
      - goos: windows
        formats: ["zip"]
    files:
      - LICENSE*
      - README.md
      - CHANGELOG.md
      - samples/**/*

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot"

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  draft: false
  prerelease: auto
